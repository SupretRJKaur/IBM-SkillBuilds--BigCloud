<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>SortIt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  
  body {
    background: #0f172a;
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 540px;
    padding: 20px;
    text-align: center;
  }

  .brand-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  h1 { font-size: 2.5rem; font-weight: 800; }
  .tagline { color: #94a3b8; margin-bottom: 24px; font-size: 1.05rem; }

  /* Media / Camera Container */
  .camera-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #video, #canvas {
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    height: 320px;
    object-fit: cover;
    border: 3px solid #334155;
    background: #1e293b;
  }

  #canvas { display: none; }

  /* Scan Button */
  .btn-action {
    margin-top: 20px;
    padding: 14px 40px;
    font-size: 1.2rem;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    cursor: pointer;
    font-weight: 700;
    transition: background 0.2s ease, transform 0.1s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-action:hover { background: #16a34a; }
  .btn-action:active { transform: scale(0.98); }
  .btn-action:disabled { background: #64748b; cursor: not-allowed; }

  .btn-reset {
    background: #3b82f6;
    margin-top: 24px;
  }
  .btn-reset:hover { background: #2563eb; }

  /* Loading State */
  .loading {
    color: #94a3b8;
    margin-top: 16px;
    font-size: 1rem;
    font-weight: 600;
  }

  /* Result Screen */
  #result {
    width: 100%;
    max-width: 480px;
    display: none;
  }

  .item-name {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 20px;
    text-transform: lowercase;
    letter-spacing: 0.5px;
  }

  .component-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1e293b;
    padding: 16px 20px;
    border-radius: 12px;
    margin-bottom: 12px;
    text-align: left;
    border: 1px solid #334155;
  }

  .part-info strong {
    font-size: 1.05rem;
    color: #f8fafc;
    display: block;
    margin-bottom: 2px;
    text-transform: capitalize;
  }

  .part-info span {
    color: #94a3b8;
    font-size: 0.85rem;
  }

  .bin-tag {
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: 800;
    font-size: 0.85rem;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  /* Color-coded Bin Styles */
  .bin-red { background: #ef4444; color: white; }        /* Hazardous */
  .bin-yellow { background: #eab308; color: #0f172a; } /* Medical */
  .bin-blue { background: #3b82f6; color: white; }       /* Recyclable */
  .bin-green { background: #22c55e; color: white; }      /* Biodegradable */

  .error-box {
    color: #ef4444;
    background: #1e293b;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #7f1d1d;
    font-size: 0.9rem;
    margin-top: 15px;
    text-align: left;
    word-break: break-word;
  }
</style>
</head>
<body>

<div class="container">
  <div class="brand-header">
    <h1>♻️ SortIt</h1>
  </div>
  <p class="tagline">Hold, Scan, Discard.</p>

  <!-- Live Camera View -->
  <div id="cameraView" class="camera-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="scanBtn" class="btn-action">📷 Scan Item</button>
    <div id="loading" class="loading" style="display:none;">Scanning... please wait</div>
  </div>

  <!-- Scan Results View (Camera hidden when shown) -->
  <div id="result">
    <div id="resultContent"></div>
    <button id="resetBtn" class="btn-action btn-reset">🔄 Scan Another Item</button>
  </div>
</div>

<script>
  // Replace with your active n8n production webhook endpoint
  const N8N_WEBHOOK_URL = "https://sort-it.app.n8n.cloud/webhook/sortit-scan";

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const scanBtn = document.getElementById('scanBtn');
  const resetBtn = document.getElementById('resetBtn');
  const loading = document.getElementById('loading');
  
  const cameraView = document.getElementById('cameraView');
  const resultDiv = document.getElementById('result');
  const resultContent = document.getElementById('resultContent');

  // Request Camera Stream
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => {
      cameraView.innerHTML += `<div class="error-box">Camera access failed: ${err.message}</div>`;
    });

  // Handle Scan Action
  scanBtn.addEventListener('click', async () => {
    scanBtn.disabled = true;
    loading.style.display = 'block';

    // Capture Frame to Canvas
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Compress frame slightly to optimize network request
    const imageBase64 = canvas.toDataURL('image/jpeg', 0.7);

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageBase64 })
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`Server responded ${response.status}: ${text.slice(0, 200)}`);
      }

      const data = await response.json();
      
      // Hide Camera View & Show Results
      cameraView.style.display = 'none';
      resultDiv.style.display = 'block';
      renderResult(data);

    } catch (err) {
      console.error('SortIt scan error:', err);
      cameraView.style.display = 'none';
      resultDiv.style.display = 'block';
      resultContent.innerHTML = `
        <div class="error-box">
          <strong>Debug info:</strong><br/>
          ${err.message || err.toString()}<br/><br/>
          Please check: (1) n8n workflow is Active, (2) CORS "Allowed Origins" = * on the webhook node.
        </div>`;
    } finally {
      loading.style.display = 'none';
      scanBtn.disabled = false;
    }
  });

  // Reset to Scan Another Item
  resetBtn.addEventListener('click', () => {
    resultDiv.style.display = 'none';
    cameraView.style.display = 'flex';
  });

  // Render Result Function with Strict Non-Undefined Fallbacks
  function renderResult(data) {
    const itemName = data.item_name || data.item || 'Detected Item';

    if (!data.components || data.components.length === 0) {
      resultContent.innerHTML = `
        <div class="item-name">${itemName}</div>
        <p style="color:#94a3b8;">Could not identify distinct parts. Please try again with clear lighting.</p>`;
      return;
    }

    let html = `<div class="item-name">${itemName}</div>`;
    
    data.components.forEach(comp => {
      // Prevent 'undefined' outputs by checking alternative properties
      const partName = comp.part || comp.component || comp.name || 'Main Component';
      const material = comp.material || 'Mixed Materials';
      const reason = comp.reason ? ` — ${comp.reason}` : '';
      const rawBin = (comp.bin || '').toLowerCase();

      // Bin Category Logic: Red (Hazardous), Yellow (Medical), Blue (Recyclable), Green (Biodegradable)
      let binClass = 'bin-blue';
      let binLabel = 'BLUE BIN';

      if (rawBin.includes('red') || rawBin.includes('hazard') || rawBin.includes('e-waste')) {
        binClass = 'bin-red';
        binLabel = 'RED BIN- Hazardous';
      } else if (rawBin.includes('yellow') || rawBin.includes('medical') || rawBin.includes('clinical')) {
        binClass = 'bin-yellow';
        binLabel = 'YELLOW BIN- Medical';
      } else if (rawBin.includes('green') || rawBin.includes('bio') || rawBin.includes('organic')) {
        binClass = 'bin-green';
        binLabel = 'GREEN BIN- Biodegradable';
      } else {
        binClass = 'bin-blue';
        binLabel = 'BLUE BIN- Recyclable';
      }

      html += `
        <div class="component-card">
          <div class="part-info">
            <strong>${partName}</strong>
            <span>${material}${reason}</span>
          </div>
          <div class="bin-tag ${binClass}">${binLabel}</div>
        </div>`;
    });

    resultContent.innerHTML = html;
  }
</script>
</body>
</html>
